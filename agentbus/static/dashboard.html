<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Agent-Bus</title>
<link rel="stylesheet" href="/static/dashboard.css">
<link rel="stylesheet" href="/vendor/katex/katex.min.css">
</head>
<body class="no-anim">
<header>
  <h1>Agent-Bus</h1>
  <span class="project" id="project"></span>
  <span class="muted" id="refreshed"></span>
  <span class="loopstate" id="loopstate" role="status" data-tip="루프 상태">루프 진행 중</span>
  <button class="iconbtn" id="toggleside" data-tip="사이드 패널" aria-label="사이드 패널"><span data-icon="panel-left"></span>
  </button>
  <button class="iconbtn" id="togglecompose" data-tip="메시지 보내기" aria-label="메시지 보내기"><span data-icon="message-circle"></span>
  </button>
  <div class="settings-wrap" id="settings-wrap">
    <button class="iconbtn" id="settingsbtn" data-tip="설정" aria-label="설정"><span data-icon="settings"></span>
    </button>
    <div class="settings-pop" id="settings-pop">
      <div class="set-sec">테마</div>
      <div class="set-row" id="theme-row">
        <button type="button" class="set-opt" data-theme="" aria-label="시스템 테마"><span data-icon="monitor"></span>
          <span class="set-label">시스템</span>
        </button>
        <button type="button" class="set-opt" data-theme="light" aria-label="라이트 테마"><span data-icon="sun"></span>
          <span class="set-label">라이트</span>
        </button>
        <button type="button" class="set-opt" data-theme="dark" aria-label="다크 테마"><span data-icon="moon"></span>
          <span class="set-label">다크</span>
        </button>
      </div>
      <div class="set-sec">텍스트 크기</div>
      <div class="set-size">
        <span class="set-size-a sm">a</span>
        <input type="range" class="set-slider" id="size-slider" min="0" max="4" step="1" value="1" aria-label="텍스트 크기">
        <span class="set-size-a lg">A</span>
      </div>
      <div class="set-sec">보안 보기</div>
      <div class="set-auth">
        <span class="set-status" id="viewer-auth-state">꺼짐</span>
        <button class="set-action" id="viewer-authbtn" type="button" aria-label="사용자 인증"><span data-icon="lock"></span>
          <span class="set-label">인증</span>
        </button>
      </div>
      <div class="set-sec">루프</div>
      <div class="set-actions">
        <button class="set-action danger" id="force-stopbtn" type="button" aria-label="강제 정지"><span data-icon="octagon-x"></span>
          <span class="set-label">강제 정지</span>
        </button>
      </div>
      <div class="set-sec">세션 메시지</div>
      <div class="set-actions">
        <button class="set-action" id="rotatebtn" type="button" aria-label="메시지 보관"><span data-icon="archive"></span>
          <span class="set-label">보관</span>
        </button>
        <button class="set-action danger" id="clearbtn" type="button" aria-label="메시지 비우기"><span data-icon="trash"></span>
          <span class="set-label">비우기</span>
        </button>
      </div>
    </div>
  </div>
</header>
<div id="compose-wrap">
<form id="compose">
  <div class="inner">
    <div class="compose-line">
      <div class="body-wrap composer-field">
        <div class="compose-input-row">
          <div class="compose-token-row">
            <div class="compose-kind" id="compose-kind">
              <button class="compose-token kind-token tag kind note" id="kind-token" type="button" data-tip="종류" aria-label="종류" aria-expanded="false">
                <span id="kind-token-label">메모</span>
              </button>
              <div class="kind-pop" id="kind-pop">
                <button type="button" class="tag kind note" data-v="note">메모</button>
                <button type="button" class="tag kind request" data-v="request">요청</button>
                <button type="button" class="tag kind report" data-v="report">보고</button>
                <button type="button" class="tag kind task" data-v="task">작업</button>
                <button type="button" class="tag kind ticket" data-v="ticket">티켓</button>
                <button type="button" class="tag kind stop" data-v="stop">정지</button>
              </div>
            </div>
          </div>
          <textarea id="body" rows="1" placeholder="메시지를 입력하세요"></textarea>
        </div>
        <div class="compose-meta-chips" id="compose-meta-chips"></div>
        <button class="iconbtn send compose-send" type="submit" data-tip="보내기" aria-label="보내기"><span data-icon="send"></span>
        </button>
        <div class="mention-menu" id="mention"></div>
      </div>
    </div>
  </div>
</form>
</div>
<div id="stopbar"></div>
<main>
  <div class="col">
    <div class="tl-toolbar">
      <div class="overview" id="overview"></div>
      <span class="filter-summary" id="filter-summary"></span>
      <div class="search-wrap" id="search-wrap">
        <input class="search-in" id="search-in" type="text" placeholder="메시지 검색…">
        <button class="iconbtn sm" id="searchbtn" data-tip="검색" aria-label="검색"><span data-icon="search"></span>
        </button>
      </div>
      <div class="filter-wrap" id="filter-wrap">
        <button class="iconbtn sm" id="filterbtn" data-tip="필터" aria-label="필터"><span data-icon="filter"></span>
        </button>
        <div class="filter-pop" id="filter-pop">
          <div class="fp-head">
            <span class="fp-head-title">필터</span>
            <button class="linkbtn fp-clear" id="fp-reset" type="button">필터 해제</button>
          </div>
          <div class="fp-sec">종류</div>
          <div class="seg filter-kind" id="fp-kinds">
            <button type="button" data-kind="note">메모</button>
            <button type="button" data-kind="request">요청</button>
            <button type="button" data-kind="report">보고</button>
            <button type="button" data-kind="task">작업</button>
            <button type="button" data-kind="ticket">티켓</button>
            <button type="button" data-kind="stop">정지</button>
          </div>
          <div class="fp-sec">참여자</div>
          <div class="fp-list" id="fp-agents"></div>
          <div class="fp-sec">작업</div>
          <div class="fp-list" id="fp-tasks"></div>
        </div>
      </div>
    </div>
    <section class="key-context-card card" id="key-context-card">
      <div class="key-context-head">
        <div class="key-context-title"><span data-icon="key"></span>
          <span>Key Context</span>
          <span class="key-context-meta" id="key-context-meta"></span>
        </div>
        <div class="key-context-actions">
          <button class="iconbtn sm" id="edit-key-context" type="button" data-tip="편집" aria-label="편집"><span data-icon="edit"></span>
          </button>
          <button class="iconbtn sm" id="toggle-key-context-lines" type="button" data-tip="접기" aria-label="접기"><span data-icon="chevron-down"></span>
          </button>
        </div>
      </div>
      <div class="key-context-body" id="key-context-body"></div>
    </section>
    <div id="timeline"></div>
  </div>
  <aside id="side">
    <div class="side-tabbar">
      <div class="side-tabs" id="side-tabs" role="tablist" aria-label="사이드 패널">
        <span class="side-tab-thumb" aria-hidden="true"></span>
        <button id="side-tab-work" class="on" type="button" role="tab" aria-selected="true" aria-controls="side-work" aria-label="작업"><span data-icon="list" data-icon-class="side-tab-icon"></span>
          <span class="side-tab-label">작업</span>
        </button>
        <button id="side-tab-agent" type="button" role="tab" aria-selected="false" aria-controls="side-agent" aria-label="에이전트"><span data-icon="agent" data-icon-class="side-tab-icon"></span>
          <span class="side-tab-label">에이전트</span>
        </button>
        <button id="side-tab-bridge" type="button" role="tab" aria-selected="false" aria-controls="side-bridge" aria-label="Bridge"><span data-icon="bridge" data-icon-class="side-tab-icon"></span>
          <span class="side-tab-label">Bridge</span>
        </button>
      </div>
    </div>
    <div id="side-scroll" class="side-scroll">
      <div id="side-work" class="side-tab-panel" role="tabpanel" aria-labelledby="side-tab-work">
        <section>
          <div class="panel-title">티켓</div>
          <div id="tickets"></div>
        </section>
        <section>
          <div class="panel-title">작업
            <span class="pt-actions">
              <button class="linkbtn" id="clear-done" type="button" hidden>완료 지우기</button>
            </span>
          </div>
          <div id="tasks"></div>
        </section>
        <section>
          <div class="panel-title">완료</div>
          <div id="completed"></div>
        </section>
      </div>
      <div id="side-agent" class="side-tab-panel" role="tabpanel" aria-labelledby="side-tab-agent" hidden>
        <section>
          <div class="panel-title">에이전트</div>
          <div id="agents"></div>
        </section>
        <section id="skills-section" hidden>
          <div class="panel-title">스킬</div>
          <div id="skills"></div>
        </section>
      </div>
      <div id="side-bridge" class="side-tab-panel" role="tabpanel" aria-labelledby="side-tab-bridge" hidden>
        <section>
          <div class="panel-title">프로필 <span class="panel-subtitle">로컬</span></div>
          <div id="bridge-profiles"></div>
        </section>
        <section>
          <div class="panel-title">게이트웨이 <span class="panel-subtitle">수신</span></div>
          <div id="bridge-gateways"></div>
        </section>
      </div>
    </div>
  </aside>
</main>
<script src="/vendor/katex/katex.min.js"></script>
<script src="/vendor/katex/auto-render.min.js"></script>
<script src="/static/dashboard-primitives.js"></script>
<script src="/static/dashboard.js"></script>
</body>
</html>
